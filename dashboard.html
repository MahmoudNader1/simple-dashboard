<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="master.css" />
  <script src="dashboard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="sidebar">
    <h2>Menu</h2>
    <ul>
      <li>Home</li>
      <li>Analytics</li>
      <li>Reports</li>
      <li>Profile</li>
    </ul>

    <button onclick="toggleDark()">Dark Mode</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">

    <div class="topbar">
      <h2>Dashboard Overview</h2>
      <div class="welcome">Welcome back 👋</div>
    </div>

    <!-- STATS CARDS -->
    <div class="cards">
      <div class="card">Users:100 <span id="users"></span></div>
      <div class="card">Sales:78 <span id="sales"></span></div>
      <div class="card">Visits:60 <span id="visits"></span></div>
      <div class="card">Revenue: $2,450</div>
    </div>

    <!-- QUICK ACTIONS -->
    <div class="section">
      <h3>Quick Actions</h3>
      <div class="actions">
        <button>Create Report</button>
        <button>Add User</button>
        <button>Export Data</button>
      </div>
    </div>

    <!-- ACTIVITY + PROFILE -->
    <div class="grid">

      

      <div class="box">
        <h3>Profile</h3>
        <p>Name: Admin User</p>
        <p>Status: Active</p>
        <p>Role: Manager</p>
      </div>

    </div>

    <!-- CHART -->
    <div class="chart-box">
      <canvas id="chart"></canvas>
    </div>

  </div>

</body>
</html>
